name: Release
on:
  push:
    branches:
      - "main"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create git tags and GitHub releases
      issues: write # @semantic-release/github failure issues
      pull-requests: write # @semantic-release/github PR comments
      id-token: write # OIDC trusted publishing to npm
    environment:
      name: npm
      url: https://www.npmjs.com/package/iati-design-system
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22.14"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build project
        run: npm run build
      - name: Build storybook
        run: npm run build:storybook
      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
