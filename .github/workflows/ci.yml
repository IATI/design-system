name: CI
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22.14"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build project
        run: npm run build
      - name: Build storybook
        run: npm run build:storybook
